<!DOCTYPE html>
<html>
<head>
<title>Advanced JavaScript and DOM Manipulation</title>
<style>
body {
  font-family: sans-serif;
  margin: 0;
  overflow-x: hidden;
  height: 300vh;
}
header {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 15vh;
    border-bottom: 2px solid black;
}
#main-link {
    color: black;
    text-transform: lowercase;
    font-size: 2rem;
}
#main-link:hover {
    color: rgb(119, 119, 119);
}
section {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
  overflow: hidden;
}.parallax-layer {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  pointer-events: none; /* Prevent layers from interfering with mouse events */
}.parallax-element {
  position: absolute;
  background-color: rgb(2, 111, 255);
  opacity: 0.7;
  transition: transform 1ms ease;
}.circle {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background-color: rgb(0, 248, 0);
  opacity: 0.7;
}.square {
  width: 50px;
  height: 50px;
  background-color: black;
}.z-shape {
  font-size: 40px;
  font-weight: bold;
  color: rgb(0, 255, 21);
}.content {
  background-color: rgba(255, 255, 255, 0.8);
  padding: 20px;
  border-radius: 10px;
  text-align: center;
  z-index: 1;
  max-width: 800px;
}.box {
  width: 100px;
  height: 100px;
  background-color: blue;
  position: absolute;
  left: 47.5%;
  top: 70%;
  /* transform: translate(-50%, -50%); */
  transition: background-color 0.3s, transform 0.3s;
  cursor: pointer;
}

#mouse-tracker {
  width: 300px;
  height: 200px;
  border: 5px dashed black;
  margin: 20px auto;
  position: relative;
  cursor: none;
  background-color: rgb(226, 226, 226);
}

#mouse-coords {
  position: absolute;
  top: 10px;
  left: 10px;
  font-size: 2rem;
}

#mouse-follower {
  width: 10px;
  height: 10px;
  background-color: rgb(255, 56, 56);
  position: absolute;
  /* border-radius: 50%; */
  pointer-events: none;
  transition: transform 0.1s ease;
  z-index: 2;
}

#scroll-to-top {
  position: fixed;
  bottom: 20px;
  right: 20px;
  display: none;
  background-color: #1eff00;
  color: rgb(0, 0, 0);
  padding: 10px 15px;
  border: 5px solid black;
  border-radius: 5px;
  cursor: pointer;
  opacity: 0.6;
  transition: opacity 0.3s;
  height: 10%;
  width: 10%;
  font-weight: bold;
  font-size: 1.5rem;
}

#scroll-to-top:hover {
  opacity: 1;
}
</style>
</head>
<body>
  <header>
        <a id="main-link" href="../index.html">Back to main index.html</a>
        <!-- <a href="https://jordangerouz.github.io/AdvancedClass/">test</a> -->
    </header>

<section id="section1">
  <div class="parallax-layer" id="layer1"></div>
  <div class="parallax-layer" id="layer2"></div>
  <div class="parallax-layer" id="layer3"></div>
  <div class="content">
    <h1>Welcome to My Website</h1>
    <p>Parallax Effect with HTML elements</p>
  </div>
</section>

<section id="section2">
  <div class="content">
    <h2>Mouse Tracking</h2>
    <div id="mouse-tracker">
      <div id="mouse-coords">Mouse coordinates will appear here.</div>
      <div id="mouse-follower"></div>
    </div>
  </div>
</section>

<section id="section3">
  <div class="content">
    <h2>Animation on Event</h2>
    <div class="box"></div>
  </div>
</section>

<section id="section4">
  <div class="content">
    <h2>Scroll to Top</h2>
    <p>Scroll back to the top!</p>
    <button id="scroll-to-top">Scroll to Top</button>
  </div>
</section>

<script>
// Parallax Effect (HTML Elements - Circles, Squares, Zs - Linear)
const parallaxLayers = document.querySelectorAll('.parallax-layer');

parallaxLayers.forEach((layer, index) => {
    const numElements = 20;
    for (let i = 0; i < numElements; i++) {
        const element = document.createElement('div');
        element.classList.add('parallax-element');

        const x = Math.random() * 100;
        const y = Math.random() * 100;

        element.style.left = `${x}%`;
        element.style.top = `${y}%`;

        if (index === 0) {
            element.classList.add('circle');
        } else if (index === 1) {
            element.classList.add('square');
        } else if (index === 2) {
            element.classList.add('z-shape');
            element.textContent = 'Jordan';
        }

        layer.appendChild(element);
    }
});

window.addEventListener('scroll', () => {
    const scrollTop = window.pageYOffset;

    parallaxLayers.forEach((layer, index) => {
        const speed = (index + 1) * 0.2; // Adjust speed as needed
        layer.style.transform = `translateY(${scrollTop * speed}px)`; // Linear parallax
    });
});


// Mouse Tracking with Follower
const mouseTracker = document.getElementById('mouse-tracker');
const mouseCoords = document.getElementById('mouse-coords');
const mouseFollower = document.getElementById('mouse-follower');

mouseTracker.addEventListener('mousemove', (event) => {
    const x = event.clientX - mouseTracker.offsetLeft;
    const y = event.clientY - mouseTracker.offsetTop;

    mouseCoords.textContent = `X: ${x}, Y: ${y}`;

    const trackerRect = mouseTracker.getBoundingClientRect();
    mouseFollower.style.transform = `translate(${event.clientX - trackerRect.left - 5}px, ${event.clientY - trackerRect.top - 5}px)`;
});

// Animation on Event (Hover)
const box = document.querySelector('.box');

box.addEventListener('mouseover', () => {
  box.style.backgroundColor = 'lightgreen';
  box.style.transform = 'scale(2.2)';
});

box.addEventListener('mouseout', () => {
  box.style.backgroundColor = 'blue';
  box.style.transform = 'scale(1)';
});


// Scroll to Top
const scrollToTopButton = document.getElementById('scroll-to-top');

window.addEventListener('scroll', () => {
    if (window.pageYOffset > 500) {
        scrollToTopButton.style.display = 'block';
    } else {
        scrollToTopButton.style.display = 'none';
    }
});

scrollToTopButton.addEventListener('click', () => {
    window.scrollTo({
        top: 0,
        behavior: 'smooth'
    });
});

</script>

</body>
</html>
